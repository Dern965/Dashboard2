# .github/workflows/update_data.yml
#
# GitHub Actions — Actualización diaria de datos BMV
# ====================================================
# Este workflow se ejecuta automáticamente todos los días hábiles
# a las 7:00 AM hora Ciudad de México (13:00 UTC invierno / 12:00 UTC verano).
#
# También se puede lanzar manualmente desde la pestaña "Actions" de GitHub.
#
# Qué hace:
#   1. Clona el repositorio
#   2. Instala dependencias (yfinance, pandas, numpy)
#   3. Ejecuta update_data.py → descarga solo los días nuevos de yfinance
#   4. Si hay cambios en el CSV, hace commit y push automáticamente
#   5. Guarda el log de ejecución como artefacto descargable

name: "📈 Actualización diaria de datos BMV"

on:
  # ── Horario automático ────────────────────────────────────────
  # Zona CDMX: UTC-6 (invierno CST) | UTC-5 (verano CDT)
  # Para cubrir ambos casos sin solapamiento con horario de apertura
  # de la BMV (9:30am), usamos 13:00 UTC (= 7am CST / 8am CDT).
  schedule:
    - cron: "0 13 * * 1-5"   # Lunes a Viernes a las 13:00 UTC

  # ── Ejecución manual desde la UI de GitHub ────────────────────
  workflow_dispatch:
    inputs:
      force_update:
        description: "Forzar actualización aunque no haya días nuevos"
        required: false
        default: "false"
        type: boolean

# ──────────────────────────────────────────────────────────────────
# Permisos: necesarios para hacer commit y push al repo
# ──────────────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  update-market-data:
    name: "Descargar y actualizar market_prices.csv"
    runs-on: ubuntu-latest
    timeout-minutes: 30          # Abortar si tarda más de 30 min

    steps:
      # ── 1. Checkout del repositorio ───────────────────────────────
      - name: "📥 Clonar repositorio"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1         # Solo el último commit (más rápido)

      # ── 2. Instalar Python ────────────────────────────────────────
      - name: "🐍 Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"           # Cachear dependencias entre runs

      # ── 3. Instalar dependencias mínimas del script ───────────────
      - name: "📦 Instalar dependencias"
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy pytz

      # ── 4. Ejecutar el script de actualización ────────────────────
      - name: "🔄 Actualizar datos de mercado"
        id: update
        run: |
          python update_data.py \
            --csv datos/market_prices.csv \
            --log datos/update.log
        continue-on-error: true   # No marcar el workflow como fallido si hay
                                   # errores parciales (ej. 1 ticker offline)

      # ── 5. Mostrar resumen del log en la interfaz de GitHub ───────
      - name: "📋 Mostrar log de actualización"
        if: always()
        run: |
          echo "====== LOG DE ACTUALIZACIÓN ======"
          cat datos/update.log || echo "(log vacío)"

      # ── 6. Verificar si hubo cambios en el CSV ────────────────────
      - name: "🔍 Detectar cambios"
        id: changes
        run: |
          git diff --name-only datos/market_prices.csv
          if git diff --quiet datos/market_prices.csv; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay datos nuevos. El CSV ya estaba al día."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            ROWS=$(python -c "import pandas as pd; df=pd.read_csv('datos/market_prices.csv'); print(len(df))")
            echo "rows=$ROWS" >> $GITHUB_OUTPUT
            echo "Se detectaron cambios en el CSV ($ROWS filas totales)."
          fi

      # ── 7. Commit y push solo si hubo cambios ─────────────────────
      - name: "💾 Commit y push de datos actualizados"
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fecha actual en zona México para el mensaje de commit
          FECHA=$(TZ="America/Mexico_City" date "+%Y-%m-%d %H:%M CDMX")

          git add datos/market_prices.csv datos/update.log
          git commit -m "📈 Datos BMV actualizados — $FECHA (${{ steps.changes.outputs.rows }} filas)"
          git push

      # ── 8. Mensaje si no hubo cambios ─────────────────────────────
      - name: "ℹ️ Sin cambios"
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "El CSV ya estaba al día. No se hizo commit."

      # ── 9. Guardar log como artefacto descargable ─────────────────
      - name: "📁 Guardar log como artefacto"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "log-actualizacion-${{ github.run_id }}"
          path: datos/update.log
          retention-days: 14     # Conservar logs 14 días
